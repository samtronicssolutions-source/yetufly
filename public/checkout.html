<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin: 30px 0;
        }
        .checkout-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .order-summary {
            background: white;
            padding: 30px;
            border-radius: 10px;
            height: fit-content;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f57224;
            font-weight: bold;
        }
        .btn-place-order {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-place-order:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .mpesa-note {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .payment-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .payment-status.waiting {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .payment-status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .payment-status.failed {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <div class="container">
            <h1>Checkout</h1>
            <div id="checkoutContent"></div>
            <div id="paymentStatus" class="payment-status"></div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="/js/main.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        let checkoutInterval = null;
        let currentCheckoutId = null;
        
        async function loadCheckout() {
            const cart = getCart();
            const ids = Object.keys(cart);
            
            if (!ids.length) {
                window.location.href = '/cart';
                return;
            }
            
            try {
                const items = [];
                let total = 0;
                for (const id of ids) {
                    const res = await fetch(`/api/products/${id}`);
                    const p = await res.json();
                    const qty = cart[id];
                    const sub = p.price * qty;
                    total += sub;
                    items.push({ ...p, quantity: qty, subtotal: sub });
                }
                
                document.getElementById('checkoutContent').innerHTML = `
                    <div class="checkout-container">
                        <div class="checkout-form">
                            <h2>Shipping Information</h2>
                            <form id="checkoutForm">
                                <div class="form-group">
                                    <label>Full Name *</label>
                                    <input type="text" id="name" required>
                                </div>
                                <div class="form-group">
                                    <label>Phone Number * (e.g., 2547XXXXXXXX)</label>
                                    <input type="tel" id="phone" placeholder="2547XXXXXXXX" required>
                                    <small style="color: #666;">M-Pesa will send payment request to this number</small>
                                </div>
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" id="email">
                                </div>
                                <div class="form-group">
                                    <label>Payment Method *</label>
                                    <select id="paymentMethod">
                                        <option value="mpesa">M-Pesa (Lipa Na M-Pesa - STK Push)</option>
                                        <option value="cod">Cash on Delivery</option>
                                    </select>
                                </div>
                                <div class="mpesa-note" id="mpesaNote">
                                    <i class="fas fa-info-circle"></i> 
                                    For M-Pesa payments, you will receive a payment request on your phone. 
                                    Enter your PIN to complete payment. Order will be created after successful payment.
                                </div>
                                <button type="submit" class="btn-place-order" id="placeOrderBtn">
                                    <i class="fas fa-check"></i> Place Order
                                </button>
                            </form>
                        </div>
                        <div class="order-summary">
                            <h2>Order Summary</h2>
                            ${items.map(i => `
                                <div class="summary-item">
                                    <span>${escapeHtml(i.name)} x ${i.quantity}</span>
                                    <span>KSh ${i.subtotal.toLocaleString()}</span>
                                </div>
                            `).join('')}
                            <div class="summary-total">
                                <strong>Total</strong>
                                <strong>KSh ${total.toLocaleString()}</strong>
                            </div>
                        </div>
                    </div>
                `;
                
                const paymentSelect = document.getElementById('paymentMethod');
                const mpesaNote = document.getElementById('mpesaNote');
                
                paymentSelect.addEventListener('change', () => {
                    mpesaNote.style.display = paymentSelect.value === 'mpesa' ? 'block' : 'none';
                });
                
                document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await placeOrder(total);
                });
                
            } catch (error) {
                console.error('Error loading checkout:', error);
            }
        }
        
        async function placeOrder(total) {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const paymentMethod = document.getElementById('paymentMethod').value;
            const submitBtn = document.getElementById('placeOrderBtn');
            const statusDiv = document.getElementById('paymentStatus');
            
            if (!name || !phone || !email) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            const phoneRegex = /^(254|0)?[7-9][0-9]{8}$/;
            if (!phoneRegex.test(phone)) {
                showNotification('Please enter a valid Kenyan phone number', 'error');
                return;
            }
            
            const cart = getCart();
            const items = Object.entries(cart).map(([id, qty]) => ({ product_id: id, quantity: qty }));
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_name: name,
                        customer_phone: phone,
                        customer_email: email,
                        items,
                        payment_method: paymentMethod
                    })
                });
                
                const result = await response.json();
                
                if (paymentMethod === 'mpesa') {
                    if (result.waiting_for_payment) {
                        // Show waiting status
                        statusDiv.className = 'payment-status waiting';
                        statusDiv.innerHTML = `
                            <i class="fas fa-clock"></i> 
                            <strong>Payment Initiated!</strong><br>
                            Please check your phone (${phone}) and enter your PIN to complete payment.<br>
                            Waiting for confirmation...
                        `;
                        
                        // Start polling for payment status
                        currentCheckoutId = result.checkout_id;
                        startPollingPaymentStatus(currentCheckoutId);
                        
                        // Clear cart
                        localStorage.removeItem('cart');
                        updateCartCount();
                        
                    } else if (result.success && result.order_number) {
                        // Direct success (shouldn't happen for M-Pesa)
                        localStorage.removeItem('cart');
                        window.location.href = `/order-success?order=${result.order_number}`;
                    } else {
                        showNotification(result.error || 'Payment initiation failed', 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-check"></i> Place Order';
                    }
                } else if (paymentMethod === 'cod') {
                    if (result.success) {
                        localStorage.removeItem('cart');
                        window.location.href = `/order-success?order=${result.order_number}`;
                    } else {
                        showNotification(result.error || 'Order failed', 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-check"></i> Place Order';
                    }
                }
                
            } catch (error) {
                console.error('Error placing order:', error);
                showNotification('Network error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Place Order';
            }
        }
        
        function startPollingPaymentStatus(checkoutId) {
            let attempts = 0;
            const maxAttempts = 30; // 30 attempts (5 minutes)
            
            checkoutInterval = setInterval(async () => {
                attempts++;
                
                try {
                    const response = await fetch(`/api/orders/payment-status/${checkoutId}`);
                    const result = await response.json();
                    
                    if (result.status === 'completed') {
                        // Payment successful
                        clearInterval(checkoutInterval);
                        const statusDiv = document.getElementById('paymentStatus');
                        statusDiv.className = 'payment-status success';
                        statusDiv.innerHTML = `
                            <i class="fas fa-check-circle"></i> 
                            <strong>Payment Successful!</strong><br>
                            Your order ${result.order_number} has been confirmed.<br>
                            Redirecting to order confirmation...
                        `;
                        
                        setTimeout(() => {
                            window.location.href = `/order-success?order=${result.order_number}`;
                        }, 3000);
                        
                    } else if (result.status === 'failed') {
                        // Payment failed
                        clearInterval(checkoutInterval);
                        const statusDiv = document.getElementById('paymentStatus');
                        statusDiv.className = 'payment-status failed';
                        statusDiv.innerHTML = `
                            <i class="fas fa-times-circle"></i> 
                            <strong>Payment Failed</strong><br>
                            ${result.message || 'Payment was not completed. Please try again.'}<br>
                            <a href="/cart" class="btn-primary" style="margin-top: 10px; display: inline-block;">Return to Cart</a>
                        `;
                        
                        // Re-enable button
                        document.getElementById('placeOrderBtn').disabled = false;
                        document.getElementById('placeOrderBtn').innerHTML = '<i class="fas fa-check"></i> Place Order';
                        
                    } else if (attempts >= maxAttempts) {
                        // Timeout
                        clearInterval(checkoutInterval);
                        const statusDiv = document.getElementById('paymentStatus');
                        statusDiv.className = 'payment-status failed';
                        statusDiv.innerHTML = `
                            <i class="fas fa-clock"></i> 
                            <strong>Payment Timeout</strong><br>
                            Payment confirmation not received. Please contact support or try again.<br>
                            <a href="/cart" class="btn-primary" style="margin-top: 10px; display: inline-block;">Return to Cart</a>
                        `;
                    }
                    
                } catch (error) {
                    console.error('Error checking payment status:', error);
                }
            }, 10000); // Check every 10 seconds
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function loadHeaderFooter() {
            try {
                const headerRes = await fetch('/header.html');
                const footerRes = await fetch('/footer.html');
                const header = await headerRes.text();
                const footer = await footerRes.text();
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
                updateCartCount();
                if (typeof loadNavCategories === 'function') loadNavCategories();
            } catch (error) {
                console.error('Error loading header/footer:', error);
            }
        }
        
        loadHeaderFooter();
        loadCheckout();
    </script>
</body>
</html>
