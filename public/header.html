<header>
    <div class="header-top">
        <div class="container">
            <div class="logo">
                <h1><a href="/">Yetu</a></h1>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="What are you looking for?" autocomplete="off">
                <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-actions">
                <a href="/cart" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </div>
    <nav class="main-nav">
        <div class="container">
            <ul class="nav-menu" id="categoriesMenu"></ul>
        </div>
    </nav>
</header>

<script>
    // Load categories for navigation
    async function loadNavCategories() {
        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();
            const mainCategories = categories.filter(c => !c.parent_id);
            
            const categoriesMenu = document.getElementById('categoriesMenu');
            if (categoriesMenu) {
                categoriesMenu.innerHTML = '<li><a href="/">Home</a></li>' + 
                    mainCategories.map(cat => `
                        <li class="dropdown">
                            <a href="/category?id=${cat._id}">${escapeHtml(cat.name)}</a>
                            ${categories.filter(c => c.parent_id === cat._id).length > 0 ? `
                                <ul class="dropdown-menu">
                                    ${categories.filter(c => c.parent_id === cat._id).map(sub => `
                                        <li><a href="/category?id=${sub._id}">${escapeHtml(sub.name)}</a></li>
                                    `).join('')}
                                </ul>
                            ` : ''}
                        </li>
                    `).join('');
            }
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    }
    
    // Search function - redirects to category page with search query
    function searchProducts() {
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            window.location.href = `/category?search=${encodeURIComponent(query)}`;
        } else {
            // Show red border if empty
            const input = document.getElementById('searchInput');
            input.style.border = '2px solid #e74c3c';
            setTimeout(() => {
                input.style.border = '2px solid #f57224';
            }, 1000);
        }
    }
    
    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchProducts();
        }
    });
    
    // Clear red border on typing
    document.getElementById('searchInput').addEventListener('input', function() {
        this.style.border = '2px solid #f57224';
    });
    
    // Escape HTML to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Load categories when page loads
    loadNavCategories();
</script>
