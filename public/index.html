<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yetu - Quality Products for Every Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h2>Excellent Quality Only</h2>
                    <p>Nothing else - Quality products at the best prices</p>
                    <a href="/category" class="btn-primary">Shop Now</a>
                </div>
            </div>
        </section>

        <section class="products-section">
            <div class="container">
                <h2 class="section-title">Featured Products</h2>
                <div class="products-grid" id="featuredProducts"></div>
            </div>
        </section>

        <section class="categories-showcase">
            <div class="container">
                <h2 class="section-title">Shop by Category</h2>
                <div class="categories-grid" id="categoriesGrid"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        async function loadFeaturedProducts() {
            try {
                const response = await fetch('/api/products?featured=true');
                const products = await response.json();
                const grid = document.getElementById('featuredProducts');
                if (grid) {
                    grid.innerHTML = products.map(p => `
                        <div class="product-card">
                            <div class="product-image">
                                <a href="/product/${p._id}">
                                    <img src="${p.image || 'https://via.placeholder.com/250'}" alt="${p.name}">
                                </a>
                            </div>
                            <div class="product-info">
                                <h3><a href="/product/${p._id}">${p.name}</a></h3>
                                <p class="price">KSh ${p.price.toLocaleString()}</p>
                                <button onclick="addToCart('${p._id}')" class="btn-add-to-cart">
                                    <i class="fas fa-shopping-cart"></i> Add to Cart
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        async function loadCategoriesGrid() {
            try {
                const response = await fetch('/api/categories');
                const categories = await response.json();
                const mainCats = categories.filter(c => !c.parent_id);
                const grid = document.getElementById('categoriesGrid');
                if (grid) {
                    grid.innerHTML = mainCats.map(cat => `
                        <div class="category-item" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://via.placeholder.com/400x300?text=${cat.name}');">
                            <h3>${cat.name}</h3>
                            <a href="/category?id=${cat._id}" class="btn-category">Shop Now</a>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadHeaderFooter() {
            try {
                const headerRes = await fetch('/header.html');
                const footerRes = await fetch('/footer.html');
                const header = await headerRes.text();
                const footer = await footerRes.text();
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
                updateCartCount();
                if (typeof loadNavCategories === 'function') loadNavCategories();
            } catch (error) {
                console.error('Error loading header/footer:', error);
            }
        }

        loadHeaderFooter();
        loadFeaturedProducts();
        loadCategoriesGrid();
    </script>
</body>
</html>
