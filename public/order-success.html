<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .success-container {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 10px;
            margin: 40px auto;
            max-width: 600px;
        }
        .success-icon {
            font-size: 80px;
            color: #27ae60;
            margin-bottom: 20px;
        }
        .order-number {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .btn-continue {
            background: #f57224;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <div class="container">
            <div class="success-container">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Order Placed Successfully!</h1>
                <p>Thank you for shopping with Yetu.</p>
                <div class="order-number">
                    <strong>Order Number:</strong> <span id="orderNumber"></span>
                </div>
                <div id="paymentInfo" style="margin: 20px 0; color: #666;"></div>
                <a href="/" class="btn-continue">Continue Shopping</a>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('orderNumber').textContent = urlParams.get('order') || 'N/A';
        
        const lastPaymentMethod = localStorage.getItem('lastPaymentMethod');
        if (lastPaymentMethod === 'mpesa') {
            document.getElementById('paymentInfo').innerHTML = `
                <i class="fas fa-mobile-alt"></i> M-Pesa payment initiated! Check your phone to complete payment.
            `;
            localStorage.removeItem('lastPaymentMethod');
        }
        
        async function loadHeaderFooter() {
            const header = await (await fetch('/header.html')).text();
            const footer = await (await fetch('/footer.html')).text();
            document.getElementById('header-placeholder').innerHTML = header;
            document.getElementById('footer-placeholder').innerHTML = footer;
            if (typeof loadNavCategories === 'function') loadNavCategories();
        }
        
        loadHeaderFooter();
    </script>
</body>
</html>
