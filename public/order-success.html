<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .success-container {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 10px;
            margin: 40px auto;
            max-width: 600px;
        }
        .success-icon {
            font-size: 80px;
            color: #27ae60;
            margin-bottom: 20px;
        }
        .order-number {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 18px;
        }
        .btn-continue {
            background: #f57224;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main>
        <div class="container">
            <div class="success-container">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Order Placed Successfully!</h1>
                <p>Thank you for shopping with Yetu.</p>
                <div class="order-number">
                    <strong>Order Number:</strong> <span id="orderNumber"></span>
                </div>
                <p>You will receive a confirmation email shortly.</p>
                <p>For M-Pesa payments, you will receive a confirmation SMS once payment is processed.</p>
                <a href="/" class="btn-continue">Continue Shopping</a>
            </div>
        </div>
    </main>
    
    <div id="footer-placeholder"></div>
    
    <script>
        // Get order number from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderNumber = urlParams.get('order');
        document.getElementById('orderNumber').textContent = orderNumber || 'N/A';
        
        async function loadHeaderFooter() {
            try {
                const headerResponse = await fetch('/header.html');
                const footerResponse = await fetch('/footer.html');
                const header = await headerResponse.text();
                const footer = await footerResponse.text();
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
            } catch (error) {
                console.error('Error loading header/footer:', error);
            }
        }
        
        loadHeaderFooter();
    </script>
</body>
</html>
