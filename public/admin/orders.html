<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Yetu Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .admin-container { display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; min-height: 100vh; }
        .sidebar h2 { padding: 20px; background: #1a2a3a; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li a { display: block; padding: 15px 20px; color: white; text-decoration: none; }
        .sidebar li a:hover { background: #34495e; }
        .content { flex: 1; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-logout { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>Yetu Admin</h2>
            <ul>
                <li><a href="/admin/dashboard"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                <li><a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <h1>Orders</h1>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
            <div id="ordersTable" class="loading">Loading orders...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login';
        }
        
        async function loadOrders() {
            try {
                const response = await fetch('/api/admin/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Failed to load orders');
                
                const orders = await response.json();
                
                if (orders.length === 0) {
                    document.getElementById('ordersTable').innerHTML = '<p style="text-align:center;padding:40px;">No orders yet</p>';
                } else {
                    document.getElementById('ordersTable').innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Order #</th>
                                    <th>Customer</th>
                                    <th>Phone</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${orders.map(o => `
                                    <tr>
                                        <td>${o.order_number}</td>
                                        <td>${o.customer_name}</td>
                                        <td>${o.customer_phone}</td>
                                        <td>KSh ${o.total_amount.toLocaleString()}</td>
                                        <td><span class="status-badge status-${o.payment_status}">${o.payment_status}</span></td>
                                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersTable').innerHTML = '<p style="text-align:center;padding:40px;color:red;">Error loading orders</p>';
            }
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin/login';
        }
        
        loadOrders();
    </script>
</body>
</html>
