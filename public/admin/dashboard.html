<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Yetu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .admin-container {
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
        }
        .sidebar h2 {
            padding: 20px;
            background: #1a2a3a;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }
        .sidebar li a:hover {
            background: #34495e;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            margin-bottom: 10px;
            color: #666;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #f57224;
        }
        .btn-add {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
        }
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            border-radius: 3px;
            border: none;
            cursor: pointer;
            margin: 0 3px;
        }
        .btn-edit {
            background: #3498db;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-save {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .close:hover {
            color: #333;
        }
        .product-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>Yetu Admin</h2>
            <ul>
                <li><a href="/admin/dashboard"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                <li><a href="#" onclick="showAddProductModal()"><i class="fas fa-plus"></i> Add Product</a></li>
                <li><a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <h1>Dashboard</h1>
                <button class="btn-add" onclick="showAddProductModal()">+ Add New Product</button>
            </div>
            
            <div class="stats-grid" id="stats">
                <div class="stat-card"><h3>Total Products</h3><div class="value">-</div></div>
                <div class="stat-card"><h3>Total Orders</h3><div class="value">-</div></div>
                <div class="stat-card"><h3>Pending Orders</h3><div class="value">-</div></div>
                <div class="stat-card"><h3>Total Revenue</h3><div class="value">-</div></div>
            </div>
            
            <h2>All Products</h2>
            <div id="productsTable" class="loading">Loading products...</div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Product</h2>
            <form id="productForm" enctype="multipart/form-data">
                <input type="hidden" id="productId" name="productId">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" name="name" required>
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="productDescription" name="description" required></textarea>
                </div>
                <div class="form-group">
                    <label>Price (KSh) *</label>
                    <input type="number" id="productPrice" name="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="productCategory" name="category_id" required></select>
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="productStock" name="stock" required>
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="productImage" name="image" accept="image/*">
                    <small id="currentImage" style="display: block; margin-top: 5px;"></small>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="productFeatured" name="featured" value="true"> Featured Product
                    </label>
                </div>
                <button type="submit" class="btn-save">Save Product</button>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login';
        }

        let categories = [];

        // Load dashboard stats and products
        async function loadDashboard() {
            try {
                // Load stats
                const statsRes = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (statsRes.ok) {
                    const stats = await statsRes.json();
                    document.getElementById('stats').innerHTML = `
                        <div class="stat-card"><h3>Total Products</h3><div class="value">${stats.totalProducts || 0}</div></div>
                        <div class="stat-card"><h3>Total Orders</h3><div class="value">${stats.totalOrders || 0}</div></div>
                        <div class="stat-card"><h3>Pending Orders</h3><div class="value">${stats.pendingOrders || 0}</div></div>
                        <div class="stat-card"><h3>Total Revenue</h3><div class="value">KSh ${(stats.totalRevenue || 0).toLocaleString()}</div></div>
                    `;
                }
                
                // Load products
                await loadProducts();
                
                // Load categories for dropdown
                await loadCategories();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Load all products
        async function loadProducts() {
            try {
                const productsRes = await fetch('/api/products');
                const products = await productsRes.json();
                
                const productsContainer = document.getElementById('productsTable');
                
                if (products.length === 0) {
                    productsContainer.innerHTML = '<p style="text-align:center;padding:40px;">No products found. Click "Add New Product" to get started!</p>';
                } else {
                    productsContainer.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Category</th>
                                    <th>Featured</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${products.map(p => `
                                    <tr>
                                        <td><img src="${p.image || 'https://via.placeholder.com/50'}" class="product-image" onerror="this.src='https://via.placeholder.com/50'"></td>
                                        <td><strong>${escapeHtml(p.name)}</strong></td>
                                        <td>KSh ${(p.price || 0).toLocaleString()}</td>
                                        <td>${p.stock ?? 'N/A'}</td>
                                        <td>${p.category_id?.name || 'Uncategorized'}</td>
                                        <td>${p.featured ? '✅ Yes' : '❌ No'}</td>
                                        <td>
                                            <button class="btn-edit" onclick="editProduct('${p._id}')">Edit</button>
                                            <button class="btn-delete" onclick="deleteProduct('${p._id}')">Delete</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsTable').innerHTML = '<p style="text-align:center;padding:40px;color:red;">Error loading products</p>';
            }
        }

        // Load categories for dropdown
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                categories = await res.json();
                const select = document.getElementById('productCategory');
                select.innerHTML = '<option value="">Select Category</option>' + 
                    categories.filter(c => !c.parent_id).map(cat => `
                        <option value="${cat._id}">${cat.name}</option>
                    `).join('');
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // Show add product modal
        function showAddProductModal() {
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('currentImage').innerHTML = '';
            document.getElementById('productModal').style.display = 'flex';
        }

        // Edit product
        async function editProduct(productId) {
            try {
                const res = await fetch(`/api/products/${productId}`);
                const product = await res.json();
                
                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('productId').value = product._id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productDescription').value = product.description;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productFeatured').checked = product.featured;
                
                // Set category
                if (product.category_id?._id) {
                    document.getElementById('productCategory').value = product.category_id._id;
                }
                
                if (product.image) {
                    document.getElementById('currentImage').innerHTML = `Current image: <img src="${product.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 5px;">`;
                }
                
                document.getElementById('productModal').style.display = 'flex';
            } catch (error) {
                console.error('Error loading product:', error);
                alert('Error loading product details');
            }
        }

        // Delete product
        async function deleteProduct(productId) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                const res = await fetch(`/api/products/${productId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    alert('Product deleted successfully!');
                    loadProducts();
                    loadDashboard();
                } else {
                    alert('Failed to delete product');
                }
            } catch (error) {
                console.error('Error deleting product:', error);
                alert('Error deleting product');
            }
        }

        // Handle form submission
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const productId = document.getElementById('productId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('productName').value);
            formData.append('description', document.getElementById('productDescription').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('category_id', document.getElementById('productCategory').value);
            formData.append('stock', document.getElementById('productStock').value);
            formData.append('featured', document.getElementById('productFeatured').checked ? 'true' : 'false');
            
            const imageFile = document.getElementById('productImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }
            
            const url = productId ? `/api/products/${productId}` : '/api/products';
            const method = productId ? 'PUT' : 'POST';
            
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (res.ok) {
                    alert(productId ? 'Product updated successfully!' : 'Product added successfully!');
                    closeModal();
                    loadProducts();
                    loadDashboard();
                } else {
                    const error = await res.json();
                    alert(error.error || 'Failed to save product');
                }
            } catch (error) {
                console.error('Error saving product:', error);
                alert('Error saving product');
            }
        });

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin/login';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
