<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Yetu</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#f57224,#ff8c42);display:flex;justify-content:center;align-items:center;height:100vh}
        .login-container{background:white;padding:40px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);width:100%;max-width:400px}
        .login-container h1{text-align:center;color:#f57224;margin-bottom:30px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:5px;font-weight:bold}
        .form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px}
        button{width:100%;padding:12px;background:#f57224;color:white;border:none;border-radius:5px;cursor:pointer;font-size:16px}
        button:hover{background:#e05e1a}
        .error{background:#f8d7da;color:#721c24;padding:10px;border-radius:5px;margin-bottom:20px;display:none}
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Yetu Admin Login</h1>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            <button type="submit">Login</button>
        </form>
    </div>
    <script src="/js/admin.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const success = await adminLogin(username, password);
            if (!success) document.getElementById('error').style.display = 'block';
        });
    </script>
</body>
</html>
